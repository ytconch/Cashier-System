<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>武告喝甲 - 園遊會籌備</title>
    <style>
        /* 基礎樣式 (保留原本風格) */
        body { font-family: "Microsoft JhengHei", sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 10px auto; padding: 15px; background-color: #f9f9f9; }
        h1, h2 { color: #2c3e50; border-bottom: 2px solid #e67e22; padding-bottom: 5px; }
        .section { background: #fff; padding: 15px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); }
        .dessert-section { border-left: 5px solid #ff80ab; background: #fff5f8; }
        ul { list-style-type: none; padding-left: 0; }
        li { padding: 5px 0; border-bottom: 1px dashed #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; color: #e67e22; }
        .staff-id { display: inline-block; background: #fff3e0; color: #e65100; padding: 2px 8px; border-radius: 4px; margin: 2px; font-size: 0.9em; border: 1px solid #ffe0b2; }
        .table-container { width: 100%; overflow-x: auto; }

        /* 新增：導覽列樣式 */
        .navbar { background-color: #e67e22; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; padding: 8px 15px; border-radius: 5px; background-color: rgba(255,255,255,0.2); transition: background 0.3s; }
        .navbar a:hover, .navbar a.active { background-color: rgba(255,255,255,0.5); }
        .header-title { text-align: center; margin-bottom: 15px; padding: 20px; background: white; border-radius: 15px; border: 3px solid #e67e22; }
        .header-title h1 { color: #d35400; font-size: 2.8em; margin: 0; border: none; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="header-title">

</body>
